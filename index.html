<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>itzzfizz Scroll Experience</title>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<!-- Smooth Scroll (Lenis) -->
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Poppins", sans-serif;
  overflow-x: hidden;
  background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
  color: white;
}

/* Section */
.section {
  height: 250vh;
  position: relative;
}

/* Sticky Track */
.track {
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Road */
.road {
  width: 100vw;
  height: 220px;
  background: #0b0b0b;
  position: relative;
  overflow: hidden;
  border-top: 4px solid #222;
  border-bottom: 4px solid #222;
  box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
}

/* Car */
.car {
  height: 220px;
  position: absolute;
  top: 0;
  left: 0;
  z-index: 10;
}

/* Trail */
.trail {
  height: 220px;
  background: linear-gradient(to right, #00ff88, transparent);
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
  width: 0;
  filter: blur(15px);
  opacity: 0.6;
}

/* Headlight */
.headlight {
  position: absolute;
  right: -60px;
  top: 50%;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(255,255,200,0.9) 0%, transparent 70%);
  transform: translateY(-50%);
  opacity: 0;
}

/* Brand Text */
.value-add {
  position: absolute;
  top: 50%;
  left: 5%;
  transform: translateY(-50%);
  font-size: clamp(3rem, 8vw, 8rem);
  font-weight: 800;
  letter-spacing: 10px;
  background: linear-gradient(90deg, #00ff88, #00c3ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 40px rgba(0,255,200,0.4);
  display: flex;
}

.value-letter {
  opacity: 0;
}

/* Info Boxes */
.text-box {
  opacity: 0;
  position: absolute;
  padding: 20px 30px;
  border-radius: 16px;
  font-weight: 600;
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

#box1 { top: 15%; right: 25%; background: rgba(255,255,255,0.08); }
#box2 { bottom: 20%; right: 35%; background: rgba(0,255,200,0.15); }
#box3 { top: 20%; right: 10%; background: rgba(255,100,100,0.15); }
#box4 { bottom: 15%; right: 10%; background: rgba(255,200,0,0.15); }

/* Speedometer */
.speedometer {
  position: fixed;
  bottom: 40px;
  left: 40px;
  font-size: 1.3rem;
  font-weight: 600;
  background: rgba(255,255,255,0.08);
  padding: 18px 28px;
  border-radius: 16px;
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<div class="section">
  <div class="track">

    <div class="road">
      <img src="xyz.png" class="car" id="car">
      <div class="headlight" id="headlight"></div>
      <div class="trail" id="trail"></div>

      <div class="value-add">
        <span class="value-letter">I</span>
        <span class="value-letter">T</span>
        <span class="value-letter">Z</span>
        <span class="value-letter">Z</span>
        <span class="value-letter">F</span>
        <span class="value-letter">I</span>
        <span class="value-letter">Z</span>
        <span class="value-letter">Z</span>
      </div>
    </div>

    <div class="text-box" id="box1">🚀 58% Increased Conversion</div>
    <div class="text-box" id="box2">📉 23% Reduced Support Calls</div>
    <div class="text-box" id="box3">⚡ 27% Faster Checkout</div>
    <div class="text-box" id="box4">🔥 40% Higher Engagement</div>

  </div>
</div>

<div class="speedometer">
  Speed: <span id="speedValue">0</span> km/h
</div>

<script>

gsap.registerPlugin(ScrollTrigger);

/* Smooth Scroll */
const lenis = new Lenis({
  duration: 1.4,
  smoothWheel: true
});

function raf(time) {
  lenis.raf(time);
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

/* Elements */
const car = document.getElementById("car");
const trail = document.getElementById("trail");
const letters = gsap.utils.toArray(".value-letter");
const speedValue = document.getElementById("speedValue");
const headlight = document.getElementById("headlight");

let carWidth;

window.addEventListener("load", () => {

  carWidth = car.offsetWidth;
  const roadWidth = window.innerWidth;
  const endX = roadWidth - carWidth;

  gsap.to(car, {
    scrollTrigger: {
      trigger: ".section",
      start: "top top",
      end: "bottom top",
      scrub: 1.5,
      pin: ".track"
    },
    x: endX,
    ease: "none",
    onUpdate: function () {

      const progress = this.scrollTrigger.progress;
      const carX = progress * endX + carWidth/2;

      gsap.set(trail, { width: carX });

      const speed = Math.floor(progress * 240);
      speedValue.innerText = speed;

      if(progress > 0.5){
        gsap.to(headlight, { opacity: 1, duration: 0.3 });
      } else {
        gsap.to(headlight, { opacity: 0, duration: 0.3 });
      }
    }
  });

});

/* Brand reveal */
gsap.to(".value-letter", {
  scrollTrigger: {
    trigger: ".section",
    start: "top center",
    end: "top+=400 center",
    scrub: 1
  },
  opacity: 1,
  stagger: 0.15
});

/* Info boxes animation */
gsap.utils.toArray(".text-box").forEach((box, i) => {
  gsap.to(box, {
    scrollTrigger: {
      trigger: ".section",
      start: `top+=${600 + i*200} top`,
      end: `top+=${800 + i*200} top`,
      scrub: 1
    },
    opacity: 1,
    y: -30
  });
});

</script>

</body>
</html>
